name: geocoding_andriod_example
description: "Demonstrates how to use the geocoding_android plugin."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

environment:
  sdk: ^3.12.0

dependencies:
  baseflow_plugin_template: 
    git: https://github.com/kumsumit/baseflow_plugin_template.git
  flutter:
    sdk: flutter

  geocoding_android:
    path: ../
  url_launcher:
    git: https://github.com/kumsumit/url_launcher.git

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
