name: geocoding_android
description: A Flutter Geocoding plugin which provides easy geocoding and reverse-geocoding features.
version: 5.0.0
repository: https://github.com/baseflow/flutter-geocoding/tree/main/geocoding_android
issue_tracker: https://github.com/Baseflow/flutter-geocoding/issues
publish_to: none

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter

  geocoding_platform_interface:
    git: https://github.com/kumsumit/geocoding_platform_interface.git

  meta: ^1.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mockito: ^5.6.3
  pigeon: ^26.1.7
  plugin_platform_interface:
    git: https://github.com/kumsumit/plugin_platform_interface.git

flutter:
  plugin:
    implements: geocoding
    platforms:
      android:
        package: com.baseflow.geocoding
        pluginClass: GeocodingPlugin
        dartPluginClass: GeocodingAndroidFactory
